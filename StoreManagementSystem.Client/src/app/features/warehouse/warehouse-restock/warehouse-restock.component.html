<!-- Warehouse Restock Form — centered card layout -->
<div class="container">
  <mat-card class="form-card">
    <mat-card-header>
      <mat-card-title>Warehouse Restock</mat-card-title>
      <mat-card-subtitle>Add new stock to the warehouse</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <!-- Reactive form bound to restockForm -->
      <form [formGroup]="restockForm" (ngSubmit)="onSubmit()">

        <!-- Product selector dropdown -->
        <mat-form-field appearance="outline">
          <mat-label>Product</mat-label>
          <mat-select formControlName="productId">
            <mat-option *ngFor="let p of products" [value]="p.id">
              {{ p.name }} ({{ p.barcode }})
            </mat-option>
          </mat-select>
          <mat-error *ngIf="restockForm.get('productId')?.hasError('required')">
            Product is required
          </mat-error>
        </mat-form-field>

        <!-- Quantity input -->
        <mat-form-field appearance="outline">
          <mat-label>Quantity</mat-label>
          <input matInput type="number" formControlName="quantity" />
          <mat-error *ngIf="restockForm.get('quantity')?.hasError('required')">
            Quantity is required
          </mat-error>
          <mat-error *ngIf="restockForm.get('quantity')?.hasError('min')">
            Quantity must be at least 1
          </mat-error>
        </mat-form-field>

        <!-- Price input -->
        <mat-form-field appearance="outline">
          <mat-label>Price (bought)</mat-label>
          <input matInput type="number" step="0.01" formControlName="price" />
          <mat-error *ngIf="restockForm.get('price')?.hasError('required')">
            Price is required
          </mat-error>
          <mat-error *ngIf="restockForm.get('price')?.hasError('min')">
            Price must be greater than 0
          </mat-error>
        </mat-form-field>

        <!-- Days to expire input -->
        <mat-form-field appearance="outline">
          <mat-label>Days to Expire</mat-label>
          <input matInput type="number" formControlName="daysToExpire" />
          <mat-error *ngIf="restockForm.get('daysToExpire')?.hasError('required')">
            Days to expire is required
          </mat-error>
          <mat-error *ngIf="restockForm.get('daysToExpire')?.hasError('min')">
            Must be at least 1 day
          </mat-error>
        </mat-form-field>

        <!-- Submit button -->
        <div class="actions">
          <button mat-raised-button color="primary" type="submit"
                  [disabled]="restockForm.invalid">
            <mat-icon>add_shopping_cart</mat-icon>
            Restock
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
