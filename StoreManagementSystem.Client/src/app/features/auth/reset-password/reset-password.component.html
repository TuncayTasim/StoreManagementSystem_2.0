<!-- Reset-password card -->
<mat-card class="reset-password-card">
  <mat-card-header>
    <mat-card-title><h2>Reset Password</h2></mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">

      <!-- Token input -->
      <mat-form-field appearance="outline">
        <mat-label>Reset Token</mat-label>
        <input matInput formControlName="token" />
        <mat-icon matPrefix>vpn_key</mat-icon>
        <mat-error *ngIf="resetForm.controls.token.hasError('required')">
          Token is required
        </mat-error>
      </mat-form-field>

      <!-- New password with visibility toggle -->
      <mat-form-field appearance="outline">
        <mat-label>New Password</mat-label>
        <input
          matInput
          formControlName="newPassword"
          [type]="hideNewPassword ? 'password' : 'text'"
          autocomplete="new-password"
        />
        <mat-icon matPrefix>lock</mat-icon>
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="hideNewPassword = !hideNewPassword"
        >
          <mat-icon>{{ hideNewPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="resetForm.controls.newPassword.hasError('required')">
          New password is required
        </mat-error>
      </mat-form-field>

      <!-- Confirm password with visibility toggle -->
      <mat-form-field appearance="outline">
        <mat-label>Confirm Password</mat-label>
        <input
          matInput
          formControlName="confirmPassword"
          [type]="hideConfirmPassword ? 'password' : 'text'"
          autocomplete="new-password"
        />
        <mat-icon matPrefix>lock_outline</mat-icon>
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="hideConfirmPassword = !hideConfirmPassword"
        >
          <mat-icon>{{ hideConfirmPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="resetForm.controls.confirmPassword.hasError('required')">
          Confirm password is required
        </mat-error>
      </mat-form-field>

      <div class="button-section">
        <button
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="resetForm.invalid"
        >
          Reset Password
        </button>
      </div>
    </form>

    <div class="links-section">
      <a routerLink="/login">Back to Login</a>
    </div>
  </mat-card-content>
</mat-card>
