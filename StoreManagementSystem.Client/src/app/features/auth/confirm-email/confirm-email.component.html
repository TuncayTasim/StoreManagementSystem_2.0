<!-- Email confirmation card -->
<mat-card class="confirm-email-card">
  <mat-card-header>
    <mat-card-title><h2>Confirm Email</h2></mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="confirmForm" (ngSubmit)="onSubmit()">

      <!-- Token input — the user pastes the token received via email -->
      <mat-form-field appearance="outline">
        <mat-label>Confirmation Token</mat-label>
        <input matInput formControlName="token" />
        <mat-icon matPrefix>vpn_key</mat-icon>
        <mat-error *ngIf="confirmForm.controls.token.hasError('required')">
          Token is required
        </mat-error>
      </mat-form-field>

      <div class="button-section">
        <button
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="confirmForm.invalid"
        >
          Confirm
        </button>
      </div>
    </form>

    <div class="links-section">
      <a routerLink="/login">Back to Login</a>
    </div>
  </mat-card-content>
</mat-card>
