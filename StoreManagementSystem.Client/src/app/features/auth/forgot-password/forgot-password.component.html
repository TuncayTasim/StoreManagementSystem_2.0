<!-- Forgot-password card -->
<mat-card class="forgot-password-card">
  <mat-card-header>
    <mat-card-title><h2>Forgot Password</h2></mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">

      <!-- Email field -->
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email" autocomplete="email" />
        <mat-icon matPrefix>email</mat-icon>
        <mat-error *ngIf="forgotForm.controls.email.hasError('required')">
          Email is required
        </mat-error>
        <mat-error *ngIf="forgotForm.controls.email.hasError('email')">
          Enter a valid email
        </mat-error>
      </mat-form-field>

      <div class="button-section">
        <button
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="forgotForm.invalid"
        >
          Send Reset Token
        </button>
      </div>
    </form>

    <!-- Links to related auth pages -->
    <div class="links-section">
      <a routerLink="/login">Back to Login</a>
      <a routerLink="/reset-password">Already have a token? Reset Password</a>
    </div>
  </mat-card-content>
</mat-card>
