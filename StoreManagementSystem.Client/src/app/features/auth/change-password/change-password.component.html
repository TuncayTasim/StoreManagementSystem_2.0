<!-- Change-password card -->
<mat-card class="change-password-card">
  <mat-card-header>
    <mat-card-title><h2>Change Password</h2></mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="changeForm" (ngSubmit)="onSubmit()">
      
      <!-- Old password with visibility toggle -->
      <mat-form-field appearance="outline">
        <mat-label>Old Password</mat-label>
        <input
          matInput
          formControlName="oldPassword"
          [type]="hideOldPassword ? 'password' : 'text'"
          autocomplete="current-password"
        />
        <mat-icon matPrefix>lock</mat-icon>
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="hideOldPassword = !hideOldPassword"
        >
          <mat-icon>{{ hideOldPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="changeForm.controls['oldPassword'].hasError('required')">
          Old password is required
        </mat-error>
      </mat-form-field>

      <!-- New password with visibility toggle -->
      <mat-form-field appearance="outline">
        <mat-label>New Password</mat-label>
        <input
          matInput
          formControlName="newPassword"
          [type]="hideNewPassword ? 'password' : 'text'"
          autocomplete="new-password"
        />
        <mat-icon matPrefix>lock_outline</mat-icon>
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="hideNewPassword = !hideNewPassword"
        >
          <mat-icon>{{ hideNewPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="changeForm.controls['newPassword'].hasError('required')">
          New password is required
        </mat-error>
      </mat-form-field>

      <div class="button-section">
        <button
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="changeForm.invalid"
        >
          Change Password
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
