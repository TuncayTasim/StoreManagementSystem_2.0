<!-- Sell Form — centered card layout -->
<div class="container">
  <mat-card class="form-card">
    <mat-card-header>
      <mat-card-title>Process Sale</mat-card-title>
      <mat-card-subtitle>Sell products from the shelf</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="sellForm" (ngSubmit)="onSubmit()">

        <!-- Product selector -->
        <mat-form-field appearance="outline">
          <mat-label>Product</mat-label>
          <mat-select formControlName="productId">
            <mat-option *ngFor="let p of products" [value]="p.id">
              {{ p.name }} ({{ p.barcode }})
            </mat-option>
          </mat-select>
          <mat-error *ngIf="sellForm.get('productId')?.hasError('required')">
            Product is required
          </mat-error>
        </mat-form-field>

        <!-- Quantity to sell -->
        <mat-form-field appearance="outline">
          <mat-label>Quantity</mat-label>
          <input matInput type="number" formControlName="quantity" />
          <mat-error *ngIf="sellForm.get('quantity')?.hasError('required')">
            Quantity is required
          </mat-error>
          <mat-error *ngIf="sellForm.get('quantity')?.hasError('min')">
            Quantity must be at least 1
          </mat-error>
        </mat-form-field>

        <!-- Payment method selector -->
        <mat-form-field appearance="outline">
          <mat-label>Payment Method</mat-label>
          <mat-select formControlName="paymentMethod">
            <mat-option *ngFor="let method of paymentMethods" [value]="method">
              {{ method }}
            </mat-option>
          </mat-select>
          <mat-error *ngIf="sellForm.get('paymentMethod')?.hasError('required')">
            Payment method is required
          </mat-error>
        </mat-form-field>

        <!-- Submit button -->
        <div class="actions">
          <button mat-raised-button color="primary" type="submit"
                  [disabled]="sellForm.invalid">
            <mat-icon>point_of_sale</mat-icon>
            Sell
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
