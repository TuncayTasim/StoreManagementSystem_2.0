<!-- Move to Shelf Form — centered card layout -->
<div class="container">
  <mat-card class="form-card">
    <mat-card-header>
      <mat-card-title>Move to Shelf</mat-card-title>
      <mat-card-subtitle>Transfer stock from warehouse to shelf</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="moveForm" (ngSubmit)="onSubmit()">

        <!-- Product selector -->
        <mat-form-field appearance="outline">
          <mat-label>Product</mat-label>
          <mat-select formControlName="productId">
            <mat-option *ngFor="let p of products" [value]="p.id">
              {{ p.name }} ({{ p.barcode }})
            </mat-option>
          </mat-select>
          <mat-error *ngIf="moveForm.get('productId')?.hasError('required')">
            Product is required
          </mat-error>
        </mat-form-field>

        <!-- Quantity to move -->
        <mat-form-field appearance="outline">
          <mat-label>Quantity</mat-label>
          <input matInput type="number" formControlName="quantity" />
          <mat-error *ngIf="moveForm.get('quantity')?.hasError('required')">
            Quantity is required
          </mat-error>
          <mat-error *ngIf="moveForm.get('quantity')?.hasError('min')">
            Quantity must be at least 1
          </mat-error>
        </mat-form-field>

        <!-- Sell price — the price this item will be sold at on the shelf -->
        <mat-form-field appearance="outline">
          <mat-label>Sell Price</mat-label>
          <input matInput type="number" step="0.01" formControlName="sellPrice" />
          <mat-error *ngIf="moveForm.get('sellPrice')?.hasError('required')">
            Sell price is required
          </mat-error>
          <mat-error *ngIf="moveForm.get('sellPrice')?.hasError('min')">
            Price must be greater than 0
          </mat-error>
        </mat-form-field>

        <!-- Submit button -->
        <div class="actions">
          <button mat-raised-button color="primary" type="submit"
                  [disabled]="moveForm.invalid">
            <mat-icon>shelves</mat-icon>
            Move to Shelf
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
