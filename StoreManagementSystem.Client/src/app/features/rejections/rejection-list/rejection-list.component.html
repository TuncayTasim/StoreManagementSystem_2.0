<!-- Rejection List — full-width read-only table -->
<div class="container">
  <h2>Rejection Records</h2>

  <!-- Rejections data table -->
  <table mat-table [dataSource]="rejections" class="mat-elevation-z4" *ngIf="rejections.length > 0">

    <!-- ID Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let row">{{ row.id }}</td>
    </ng-container>

    <!-- Source Type Column (e.g. "Warehouse" or "Shelf") -->
    <ng-container matColumnDef="sourceType">
      <th mat-header-cell *matHeaderCellDef>Source Type</th>
      <td mat-cell *matCellDef="let row">{{ row.sourceType }}</td>
    </ng-container>

    <!-- Product Name Column -->
    <ng-container matColumnDef="productName">
      <th mat-header-cell *matHeaderCellDef>Product Name</th>
      <td mat-cell *matCellDef="let row">{{ row.productName }}</td>
    </ng-container>

    <!-- Reason Column -->
    <ng-container matColumnDef="reason">
      <th mat-header-cell *matHeaderCellDef>Reason</th>
      <td mat-cell *matCellDef="let row">{{ row.reason }}</td>
    </ng-container>

    <!-- Rejected At Column -->
    <ng-container matColumnDef="rejectedAt">
      <th mat-header-cell *matHeaderCellDef>Rejected At</th>
      <td mat-cell *matCellDef="let row">{{ row.rejectedAt | date:'medium' }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <!-- Empty state -->
  <p *ngIf="rejections.length === 0" class="empty-state">
    No rejection records found.
  </p>
</div>
